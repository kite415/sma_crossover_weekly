name: SMA crossover alerter

on:
  schedule:
    # 21:30 UTC, Mon-Fri. That's 4:30pm EST / 5:30pm EDT -- always after the
    # 4:00pm ET US market close. GitHub cron is UTC and may fire late; fine here.
    - cron: "30 21 * * 1-5"
  workflow_dispatch:        # manual "Run workflow" button for testing
    inputs:
      confirm_mode:
        description: "Override CONFIRM_MODE (close | live)"
        required: false
        default: ""

permissions:
  contents: write           # needed to commit state.json back to the repo

concurrency:
  group: sma-alerter        # never overlap runs (avoids state.json push races)
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alerter
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # Optional: set a self-hosted server via secret, else defaults to ntfy.sh
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          # Manual runs can override the mode; scheduled runs use the script default.
          CONFIRM_MODE: ${{ github.event.inputs.confirm_mode }}
        run: python alerter.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- state.json; then
            git add state.json
            git commit -m "Update SMA crossover state [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
